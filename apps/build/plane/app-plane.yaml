apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plane-ce
  namespace: argocd
spec:
  project: build
  source:
    chart: plane-ce
    repoURL: https://helm.plane.so/
    targetRevision: 1.4.1
    helm:
      releaseName: plane-ce
      values: |
        planeVersion: v1.2.0
        ingress:
          enabled: true
          appHost: "plane.galluman.com"
          ingressClass: "nginx"
          ingress_annotations:
            nginx.ingress.kubernetes.io/proxy-body-size: 200m
            cert-manager.io/cluster-issuer: lets-encrypt
            nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        ssl:

  destination:
    server: "https://kubernetes.default.svc"
    namespace: build
  syncPolicy:
    automated: {}
