apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plane-ce
  namespace: argocd
spec:
  project: build
  source:
    chart: plane-ce
    repoURL: https://helm.plane.so/
    targetRevision: 1.4.1
    helm:
      releaseName: plane-ce
      values: |
        planeVersion: v1.2.0
        ingress:
          enabled: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: build
  syncPolicy:
    automated: {}
