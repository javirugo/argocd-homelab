apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nxrm-ha
  namespace: argocd
spec:
  project: build
  source:
    chart: nxrm-ha
    repoURL: https://sonatype.github.io/helm3-charts/
    targetRevision: 90.0.0
    helm:
      releaseName: nxrm-ha
      values: |
        namespaces:
          nexusNs:
            enabled: false
            name: build
        statefulset:
          replicaCount: 1
          clustered: false
          container:
            image:
              repository: sonatype/nexus3
              nexusTag: 3.89.1
            resources:
              requests:
                cpu: 4
                memory: 8Gi
              limits:
                cpu: 8
                memory: 16Gi
            # workaround to use Nexus CE (see https://github.com/sonatype/nxrm3-ha-repository/issues/125)
            additionalEnv:
              - name: INSTALL4J_ADD_VM_PARAMS
                value: "-Xms8192m -Xmx8192m -Dnexus.loadAsOSS=true -Dnexus.datastore.enabled=true -Djava.util.prefs.userRoot=${NEXUS_DATA}/javaprefs -Dnexus.datastore.nexus.jdbcUrl=jdbc:postgresql://${DB_HOST}:5432/${DB_NAME} -Dnexus.datastore.nexus.username=${DB_USER} -Dnexus.datastore.nexus.password=${DB_PASSWORD}"
        service:
          nexus:
            enabled: true
            type: ClusterIP
        ingress:
          enabled: true
          defaultRule: true
          host: nexus.galluman.com
          hostPath: /
          incressClassName: nginx
          annotations:
            nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
            cert-manager.io/cluster-issuer: lets-encrypt
            nginx.ingress.kubernetes.io/proxy-body-size: 10g
            proxy-connect-timeout: "100"
            proxy-read-timeout: "1200"
            proxy-send-timeout: "1200"
          tls:
            - secretName: nexus-ingress-tls
              hosts:
              - nexus.galluman.com
              - docker.galluman.com
              - dockerproxy.galluman.com
        storageClass:
          enabled: false
          name: ssd-hostpath
          provisioner: microk8s.io/hostpath
        pvc:
          storage: 200Gi
          volumeClaimTemplate:
            enabled: true
        nexus:
          docker:
            enabled: true
            type: NodePort
            registries:
            - host: docker.galluman.com
              port: 5000
              nodePort: 30500
              secretName: nexus-ingress-tls
              annotations:
                nginx.ingress.kubernetes.io/proxy-body-size: 10g
                nginx.ingress.kubernetes.io/proxy-connect-timeout: "100"
                nginx.ingress.kubernetes.io/proxy-read-timeout: "1200"
                nginx.ingress.kubernetes.io/proxy-send-timeout: "1200"
                nginx.ingress.kubernetes.io/proxy-buffering: "off"
                nginx.ingress.kubernetes.io/proxy_request_buffering: "off"
                nginx.ingress.kubernetes.io/tcp_nodelay: "on"
            - host: dockerproxy.galluman.com
              port: 5001
              nodePort: 30501
              annotations:
                nginx.ingress.kubernetes.io/proxy-body-size: 10g
                nginx.ingress.kubernetes.io/proxy-connect-timeout: "100"
                nginx.ingress.kubernetes.io/proxy-read-timeout: "1200"
                nginx.ingress.kubernetes.io/proxy-send-timeout: "1200"
                nginx.ingress.kubernetes.io/proxy-buffering: "off"
                nginx.ingress.kubernetes.io/proxy_request_buffering: "off"
                nginx.ingress.kubernetes.io/tcp_nodelay: "on"
              secretName: nexus-ingress-tls
  destination:
    server: "https://kubernetes.default.svc"
    namespace: build
  syncPolicy:
    automated: {}
